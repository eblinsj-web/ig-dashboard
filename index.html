<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>에블린 인스타그램 대시보드</title>
<style>
  :root {
    --bg: #f7f7f5; --card: #ffffff; --card-hover: #fafafa;
    --border: #e6e6e1; --text: #1c1c1a; --muted: #71716b;
    --accent: #c13584; --good: #16a34a; --blue: #2563eb;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
    background: var(--bg); color: var(--text); padding: 32px 20px 64px;
  }
  .wrap { max-width: 1200px; margin: 0 auto; }
  header { margin-bottom: 28px; }
  h1 { font-size: 22px; font-weight: 700; }
  h1 .dot {
    margin-right: 8px; vertical-align: middle;
  }
  .sub { color: var(--muted); font-size: 13px; margin-top: 6px; }
  section { margin-bottom: 40px; }
  h2 {
    font-size: 15px; font-weight: 700; margin-bottom: 14px;
    display: flex; align-items: baseline; gap: 8px;
  }
  h2 .note { font-size: 11px; font-weight: 400; color: var(--muted); }
  .panel {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 20px;
  }

  /* 월별 비교 표 */
  .delta { font-size: 12px; }
  .delta.up { color: var(--good); } .delta.down { color: #dc2626; } .delta.flat { color: var(--muted); }
  /* 팔로워 카드 */
  .fcard { padding: 22px 24px; }
  .fmain { display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; }
  .fnum { font-size: 38px; font-weight: 700; color: var(--text); line-height: 1; }
  .fdeltawrap { display: flex; align-items: baseline; gap: 8px; }
  .fdelta { font-size: 18px; font-weight: 700; }
  .fdelta.up { color: var(--good); } .fdelta.down { color: #dc2626; } .fdelta.flat { color: var(--muted); }
  .fbase { font-size: 12px; color: var(--muted); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 10px 12px; text-align: right; border-bottom: 1px solid var(--border); }
  th:first-child, td:first-child { text-align: left; }
  th { color: var(--muted); font-weight: 600; font-size: 12px; }
  td.month { font-weight: 700; }
  .chart-legend { display: flex; gap: 18px; margin-bottom: 14px; font-size: 13px; color: var(--muted); }
  .chart-legend span { display: flex; align-items: center; gap: 6px; }
  .chart-legend .lg { width: 11px; height: 11px; border-radius: 2px; display: inline-block; }
  /* 이번 달 BEST */
  .bestgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .bestcard { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; position: relative; display: flex; flex-direction: column; }
  .bestbadge { position: absolute; top: 12px; left: 12px; z-index: 2; color: #fff; font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
  .bestthumb { width: 100%; height: 200px; object-fit: cover; background: #eee; display: block; }
  .bestthumb.placeholder { display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 13px; }
  .bestbody { padding: 14px 16px 16px; }
  .beststat { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .beststat .bigval { font-size: 26px; font-weight: 700; color: var(--text); }
  .bestsub { font-size: 12px; color: var(--muted); }
  @media (max-width: 560px) { .bestgrid { grid-template-columns: 1fr; } }

  /* 카드 그리드 */
  .grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; transition: background .15s, transform .15s; }
  .card:hover { background: var(--card-hover); transform: translateY(-2px); }
  .thumb { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #eee; display: block; }
  .thumb.placeholder { display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 13px; }
  .cbody { padding: 14px 16px 16px; }
  .ctop { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .type { font-size: 11px; font-weight: 600; letter-spacing: .04em; color: var(--accent); text-transform: uppercase; }
  .cdate { font-size: 11px; color: var(--muted); }
  .caption { font-size: 13px; line-height: 1.45; margin: 8px 0 14px; color: #5a5a55; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px 8px; margin-bottom: 14px; }
  .metric .label { font-size: 10px; color: var(--muted); margin-bottom: 2px; }
  .metric .val { font-size: 15px; font-weight: 600; }
  .rate { background: #effaf2; border: 1px solid #c8efd6; border-radius: 9px; padding: 9px 12px; display: flex; justify-content: space-between; align-items: center; }
  .rate.eng { background: #eef4ff; border-color: #cfe0fd; margin-bottom: 8px; }
  .rate .label { font-size: 12px; color: var(--muted); }
  .rate .val { font-size: 16px; font-weight: 700; color: var(--good); }
  .rate.eng .val { color: var(--blue); }
  .link { display: block; margin-top: 12px; font-size: 12px; color: var(--accent); text-decoration: none; }
  .link:hover { text-decoration: underline; }
  .state { margin: 30px auto; text-align: center; color: var(--muted); line-height: 1.6; font-size: 14px; }
  .state.error { color: #dc2626; }
  .empty { color: var(--muted); font-size: 13px; padding: 8px 0; }
  code { background: #ececec; color: #c13584; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
</head>
<body>
<div class="wrap">
  <header>
    <h1><span class="dot">🤓</span>에블린 인스타그램 대시보드</h1>
    <div class="sub">팔로워 · 2026 월별 비교 · 최근 20개 게시물</div>
  </header>
  <div id="root"><div class="state">불러오는 중…</div></div>
</div>

<script>
// ===== 구글 시트 웹앱 URL — 본인 URL로 바꾸세요 =====
const SHEET_API = "https://script.google.com/macros/s/AKfycbzvRRb2oIFs_BmAAnvyJ-_3km9WEWvnYWsQGJEZJH-bpCW_JWm5HLRsF_KDMNcx3fPc/exec";

const nf = new Intl.NumberFormat("ko-KR");
const fmt = (n) => nf.format(Math.round(n ?? 0));
const pct = (r) => r == null ? "—" : (r * 100).toFixed(1) + "%";
const dateFmt = (ts) => ts ? new Date(ts).toLocaleDateString("ko-KR", { month: "short", day: "numeric" }) : "";
const esc = (s) => (s || "").replace(/</g, "&lt;");

const METRICS = [
  ["reach", "도달"], ["views", "조회"], ["likes", "좋아요"],
  ["comments", "댓글"], ["saved", "저장"], ["shares", "공유"],
];

// ===== 시트 데이터(followerDays, posts) → 대시보드용 형태로 가공 =====
function buildModel(raw) {
  const followerDays = (raw.followerDays || []).slice().sort((a, b) => a.date.localeCompare(b.date));
  const posts = (raw.posts || []).slice().sort((a, b) => (b.timestamp || "").localeCompare(a.timestamp || ""));

  // ── 팔로워 추이 ──
  let followerTrend = null;
  if (followerDays.length) {
    const last = followerDays[followerDays.length - 1];
    const recent30 = followerDays.slice(-30);
    // 전월 말일 기준값: 마지막 데이터의 '이전 달' 마지막 날 값
    const curMonth = last.date.slice(0, 7);
    const prevMonthDays = followerDays.filter((d) => d.date.slice(0, 7) < curMonth);
    let baseline = null, baselineMonth = null, delta = null;
    if (prevMonthDays.length) {
      const b = prevMonthDays[prevMonthDays.length - 1];
      baseline = b.followers; baselineMonth = b.date.slice(0, 7);
      delta = last.followers - baseline;
    }
    followerTrend = { date: last.date, followers: last.followers, recent30, baseline, baselineMonth, delta };
  }

  // ── 월별 비교 (2026년, 게시물 timestamp 기준) ──
  const byMonth = {};
  posts.forEach((p) => {
    if (!p.timestamp || p.timestamp.slice(0, 4) !== "2026") return;
    const mo = p.timestamp.slice(0, 7);
    (byMonth[mo] = byMonth[mo] || []).push(p);
  });
  const monthly = Object.keys(byMonth).sort().map((mo) => {
    const arr = byMonth[mo];
    const sum = (f) => arr.reduce((s, p) => s + (f(p) || 0), 0);
    return {
      month: mo,
      count: arr.length,
      avgReach: sum((p) => p.metrics.reach) / arr.length,
      avgEngagement: sum((p) => p.engagement) / arr.length,
    };
  });

  // ── 이번 달 BEST (가장 최근 게시물의 달) ──
  let best = null;
  if (posts.length) {
    const latestMonth = posts[0].timestamp ? posts[0].timestamp.slice(0, 7) : null;
    if (latestMonth) {
      const monthPosts = posts.filter((p) => p.timestamp && p.timestamp.slice(0, 7) === latestMonth);
      const topReach = monthPosts.slice().sort((a, b) => b.metrics.reach - a.metrics.reach)[0] || null;
      const topEng = monthPosts.slice().sort((a, b) => b.engagement - a.engagement)[0] || null;
      best = { month: latestMonth, reach: topReach, engagement: topEng };
    }
  }

  // ── 최근 20개 ──
  const recent = posts.slice(0, 20);

  return { followerTrend, monthly, best, recent };
}

// ── 팔로워 추이 ──
function followerSection(ft) {
  if (!ft || ft.followers == null) {
    return `<section><h2>팔로워</h2>
      <div class="panel"><div class="empty">아직 쌓인 팔로워 데이터가 없어요. 매일 자정 자동 수집이 돌면 채워져요.</div></div></section>`;
  }
  const dateTxt = ft.date ? `${parseInt(ft.date.slice(5,7),10)}월 ${parseInt(ft.date.slice(8),10)}일 기준` : "";
  let deltaHtml, baseTxt;
  if (ft.delta != null) {
    const cls = ft.delta > 0 ? "up" : ft.delta < 0 ? "down" : "flat";
    const sign = ft.delta > 0 ? "▲" : ft.delta < 0 ? "▼" : "·";
    deltaHtml = `<span class="fdelta ${cls}">${sign} ${fmt(Math.abs(ft.delta))}</span>`;
    baseTxt = `전월(${ft.baselineMonth ? parseInt(ft.baselineMonth.slice(5),10)+"월" : ""}) 말 ${fmt(ft.baseline)}명 대비`;
  } else {
    deltaHtml = `<span class="fdelta flat">—</span>`;
    baseTxt = `전월 데이터 없음 · 다음 달부터 증감 비교`;
  }
  return `<section><h2>팔로워 <span class="note">${dateTxt}</span></h2>
    <div class="panel fcard">
      <div class="fmain">
        <div class="fnum">${fmt(ft.followers)}</div>
        <div class="fdeltawrap">${deltaHtml}<span class="fbase">${baseTxt}</span></div>
      </div>
    </div>
    ${followerChart(ft.recent30 || [])}</section>`;
}

// 최근 30일 팔로워 꺾은선 그래프 (SVG)
function followerChart(data) {
  if (!data || data.length < 2) {
    return `<div class="panel" style="margin-top:14px"><div class="empty">최근 30일 추이는 데이터가 2일 이상 쌓이면 그려져요. 매일 자정 수집이 돌 때마다 점이 하나씩 늘어요.</div></div>`;
  }
  const W = 1000, H = 260, padL = 56, padR = 16, padT = 18, padB = 34;
  const vals = data.map((d) => d.followers);
  const max = Math.max(...vals), min = Math.min(...vals);
  const span = (max - min) || 1;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const step = data.length > 1 ? plotW / (data.length - 1) : 0;
  const x = (i) => padL + i * step;
  const y = (v) => padT + plotH - ((v - min) / span) * plotH;

  const line = data.map((d, i) => `${x(i).toFixed(1)},${y(d.followers).toFixed(1)}`).join(" ");
  const area = `${padL},${(padT+plotH).toFixed(1)} ${line} ${x(data.length-1).toFixed(1)},${(padT+plotH).toFixed(1)}`;

  const yticks = [min, Math.round((min+max)/2), max].map((v) =>
    `<line x1="${padL}" y1="${y(v).toFixed(1)}" x2="${W-padR}" y2="${y(v).toFixed(1)}" stroke="var(--border)" stroke-width="1"/>
     <text x="${padL-8}" y="${(y(v)+4).toFixed(1)}" text-anchor="end" font-size="13" fill="var(--muted)">${fmt(v)}</text>`
  ).join("");

  const idxs = [0, Math.floor((data.length-1)/2), data.length-1];
  const xlabels = idxs.map((i) => {
    const d = data[i].date;
    const lbl = `${parseInt(d.slice(5,7),10)}/${parseInt(d.slice(8),10)}`;
    return `<text x="${x(i).toFixed(1)}" y="${H-10}" text-anchor="middle" font-size="13" fill="var(--muted)">${lbl}</text>`;
  }).join("");

  const lastX = x(data.length-1), lastY = y(data[data.length-1].followers);

  return `<div class="panel" style="margin-top:14px">
    <div class="note" style="margin-bottom:6px">최근 ${data.length}일 추이</div>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block" preserveAspectRatio="xMidYMid meet">
      ${yticks}
      <polygon points="${area}" fill="var(--accent)" opacity="0.08"/>
      <polyline points="${line}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>
      <circle cx="${lastX.toFixed(1)}" cy="${lastY.toFixed(1)}" r="4" fill="var(--accent)"/>
      ${xlabels}
    </svg>
  </div>`;
}

// ── 월별 비교 ──
function monthlySection(monthly) {
  if (!monthly || monthly.length === 0) {
    return `<section><h2>2026 월별 비교</h2>
      <div class="panel"><div class="empty">2026년 게시물이 아직 없어요.</div></div></section>`;
  }
  return `<section><h2>2026 월별 비교 <span class="note">게시물당 평균 도달 · 평균 인게이지먼트</span></h2>
    <div class="panel">
      <div class="chart-legend">
        <span><span class="lg" style="background:#f3c6dd"></span>평균 도달</span>
        <span><span class="lg" style="background:#c2d6f5"></span>평균 인게이지먼트</span>
      </div>
      <div style="position:relative;width:100%;height:240px">
        <canvas id="monthlyChart" role="img" aria-label="2026년 월별 게시물당 평균 도달과 평균 인게이지먼트 막대 차트"></canvas>
      </div>
    </div></section>`;
}

function drawMonthlyChart(monthly) {
  if (!monthly || monthly.length === 0) return;
  const el = document.getElementById("monthlyChart");
  if (!el || typeof Chart === "undefined") return;
  const labels = monthly.map((m) => `${parseInt(m.month.slice(5), 10)}월`);
  const valueLabels = {
    id: "valueLabels",
    afterDatasetsDraw(chart) {
      const { ctx } = chart;
      ctx.save();
      ctx.font = "600 11px -apple-system, sans-serif";
      ctx.textAlign = "center";
      const labelColors = ["#d98bb8", "#7fa9e6"];
      chart.data.datasets.forEach((ds, di) => {
        const meta = chart.getDatasetMeta(di);
        meta.data.forEach((bar, i) => {
          const v = ds.data[i];
          if (v == null) return;
          ctx.fillStyle = labelColors[di] || ds.backgroundColor;
          ctx.fillText(v.toLocaleString(), bar.x, bar.y - 5);
        });
      });
      ctx.restore();
    },
  };
  new Chart(el, {
    type: "bar",
    plugins: [valueLabels],
    data: {
      labels,
      datasets: [
        { label: "평균 도달", data: monthly.map((m) => Math.round(m.avgReach)),
          backgroundColor: "#f3c6dd", yAxisID: "y", borderRadius: 4, maxBarThickness: 40 },
        { label: "평균 인게이지먼트", data: monthly.map((m) => Math.round(m.avgEngagement)),
          backgroundColor: "#c2d6f5", yAxisID: "y1", borderRadius: 4, maxBarThickness: 40 },
      ],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      layout: { padding: { top: 18 } },
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { autoSkip: false, color: "#71716b" }, grid: { display: false } },
        y: { type: "linear", position: "left", title: { display: true, text: "평균 도달", color: "#d98bb8" },
          ticks: { color: "#71716b", callback: (v) => v.toLocaleString() }, grid: { color: "rgba(0,0,0,0.06)" } },
        y1: { type: "linear", position: "right", title: { display: true, text: "평균 인게이지먼트", color: "#7fa9e6" },
          ticks: { color: "#71716b", callback: (v) => v.toLocaleString() }, grid: { display: false } },
      },
    },
  });
}

// ── 최근 카드 ──
function card(p) {
  const m = p.metrics;
  const thumb = p.thumbnail
    ? `<img class="thumb" src="${p.thumbnail}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\\'thumb placeholder\\'>미리보기 없음</div>'">`
    : `<div class="thumb placeholder">미리보기 없음</div>`;
  const rows = METRICS.map(([k, l]) => `<div class="metric"><div class="label">${l}</div><div class="val">${fmt(m[k])}</div></div>`).join("");
  return `<div class="card">
    ${thumb}
    <div class="cbody">
      <div class="ctop"><span class="type"></span><span class="cdate">${dateFmt(p.timestamp)}</span></div>
      <div class="caption">${esc(p.caption) || "(캡션 없음)"}</div>
      <div class="metrics">${rows}</div>
      <div class="rate eng"><span class="label">인게이지먼트 (좋아요+댓글+저장+공유)</span><span class="val">${fmt(p.engagement)}</span></div>
      <div class="rate"><span class="label">반응율 (인게이지먼트 ÷ 도달)</span><span class="val">${pct(p.reactionRate)}</span></div>
      ${p.permalink ? `<a class="link" href="${p.permalink}" target="_blank" rel="noopener">게시물 보기 ↗</a>` : ""}
    </div></div>`;
}

function bestCard(p, badge, metricLabel, metricValue, accentVar) {
  if (!p) return `<div class="bestcard"><div class="bestbadge" style="background:${accentVar}">${badge}</div><div class="empty" style="padding:20px">해당 게시물이 없어요</div></div>`;
  const thumb = p.thumbnail
    ? `<img class="bestthumb" src="${p.thumbnail}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\\'bestthumb placeholder\\'>미리보기 없음</div>'">`
    : `<div class="bestthumb placeholder">미리보기 없음</div>`;
  return `<div class="bestcard">
    <div class="bestbadge" style="background:${accentVar}">${badge}</div>
    ${thumb}
    <div class="bestbody">
      <div class="caption" style="margin:0 0 10px">${esc(p.caption) || "(캡션 없음)"}</div>
      <div class="beststat"><span class="label">${metricLabel}</span><span class="bigval">${fmt(metricValue)}</span></div>
      <div class="bestsub">도달 ${fmt(p.metrics?.reach)} · 인게이지먼트 ${fmt(p.engagement)} · 반응율 ${pct(p.reactionRate)}</div>
      ${p.permalink ? `<a class="link" href="${p.permalink}" target="_blank" rel="noopener">게시물 보기 ↗</a>` : ""}
    </div></div>`;
}

function bestSection(best) {
  if (!best || (!best.reach && !best.engagement)) {
    return `<section><h2>이번 달 BEST <span class="note">${best?.month ? parseInt(best.month.slice(5),10)+"월" : ""}</span></h2>
      <div class="panel"><div class="empty">이번 달 게시물이 아직 없어요.</div></div></section>`;
  }
  const ml = best.month ? `${parseInt(best.month.slice(5),10)}월` : "";
  return `<section><h2>이번 달 BEST <span class="note">${ml} · 부문별 1위</span></h2>
    <div class="bestgrid">
      ${bestCard(best.reach, "도달 1위", "도달", best.reach?.metrics?.reach ?? 0, "#d98bb8")}
      ${bestCard(best.engagement, "인게이지먼트 1위", "인게이지먼트", best.engagement?.engagement ?? 0, "#7fa9e6")}
    </div></section>`;
}

function recentSection(recent) {
  if (!recent || recent.length === 0) {
    return `<section><h2>최근 게시물</h2><div class="panel"><div class="empty">게시물이 없어요.</div></div></section>`;
  }
  return `<section><h2>최근 게시물 <span class="note">최신 ${recent.length}개</span></h2>
    <div class="grid">${recent.map(card).join("")}</div></section>`;
}

async function load() {
  const root = document.getElementById("root");
  try {
    const res = await fetch(SHEET_API);
    const raw = await res.json();
    const data = buildModel(raw);
    root.innerHTML = followerSection(data.followerTrend) + monthlySection(data.monthly) + bestSection(data.best) + recentSection(data.recent);
    drawMonthlyChart(data.monthly);
  } catch (e) {
    root.innerHTML = `<div class="state error">데이터를 불러오지 못했습니다.<br>${e.message}<br><br>
      <code>SHEET_API</code> 주소가 올바른지 확인하세요.</div>`;
  }
}
load();
</script>
</body>
</html>
